<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury brand feedback</title>
</head>
<body>

    <h1>welcome to luxury brand Products Feedback</h1>
    <h2>Provide your feedback</h2>

    <label for="name">Enter your name:</label>
    <input type="text" id ="name" placeholder="your name" required><br>

    <label for="age">Enter your age:</label>
    <input type="number" id ="age" placeholder="your age" required><br>

    <label for="email">Enter your email:</label>
    <input type="email" id ="email" placeholder="your email" required><br>

    <label for="job">Enter your job:</label>
    <input type="text" id ="job" placeholder="your job" required><br>

    <label for="designation">Enter your designation:</label>
    <input type="text" id ="designation" placeholder="your designation" required><br>

    <label for="product type">product type:</label>
    <select id="producttype" required>
        <option value="perfume">perfume</option>
        <option value="cream">cream</option>
        <option value="oils">oils</option>
    </select><br>
    <label for="feedbacktext">feedback:</label><br>
    <textarea id="feedbacktext" cols="30" rows="10" placeholder="enter your feedback here" required></textarea><br>
    <button id="submitBtn"> submit feedback</button>
    <hr>
    <div id="userinfo" style="display:none;">
    <h2>user information:</h2>
    <p>Name: <span id="uname"></span> </p>
    <p>age: <span id="uage"></span> </p>
    <p>email: <span id="uemail"></span> </p>
    <p>job: <span id="ujob"></span> </p>
    <p>designation: <span id="udesignation"></span> </p>
    <p>feedback for: <span id="uproductchoice"></span><span id="userfeedback"></span> </p>
</div>
<script src="./product_survey.js"></script>
</body>
</html>
